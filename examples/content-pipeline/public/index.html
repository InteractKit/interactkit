<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Pipeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #f0f0f0;
    }

    .subtitle {
      color: #8b949e;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* Input area */
    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .input-row input {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      color: #e1e4e8;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #58a6ff; }

    .input-row button {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #238636;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #2ea043; }
    .input-row button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    /* Progress tracker */
    .progress-tracker {
      display: none;
      margin-bottom: 2rem;
      padding: 1.25rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
    }

    .progress-tracker.active { display: block; }

    .progress-topic {
      font-weight: 600;
      margin-bottom: 1rem;
      color: #f0f0f0;
    }

    .stages {
      display: flex;
      gap: 0;
      align-items: center;
    }

    .stage {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #484f58;
      transition: color 0.3s;
    }

    .stage .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #30363d;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .stage.active .dot { background: #f0883e; box-shadow: 0 0 8px rgba(240,136,62,0.5); }
    .stage.active { color: #f0883e; }
    .stage.done .dot { background: #238636; }
    .stage.done { color: #3fb950; }

    .stage-connector {
      width: 40px;
      height: 2px;
      background: #30363d;
      margin: 0 0.25rem;
      transition: background 0.3s;
    }

    .stage-connector.done { background: #238636; }

    /* Job list */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #f0f0f0;
    }

    .jobs-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .job-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
      overflow: hidden;
    }

    .job-card:hover { border-color: #58a6ff; }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 1rem;
    }

    .job-topic { font-weight: 500; }

    .job-status {
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-weight: 500;
    }

    .job-status.researching { background: rgba(240,136,62,0.15); color: #f0883e; }
    .job-status.writing { background: rgba(136,132,240,0.15); color: #8884f0; }
    .job-status.editing { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .job-status.done { background: rgba(63,185,80,0.15); color: #3fb950; }

    .job-details {
      display: none;
      padding: 0 1rem 1rem;
      border-top: 1px solid #30363d;
    }

    .job-card.expanded .job-details { display: block; }

    .detail-section {
      margin-top: 0.75rem;
    }

    .detail-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #8b949e;
      cursor: pointer;
      user-select: none;
      padding: 0.3rem 0;
    }

    .detail-toggle:hover { color: #c9d1d9; }
    .detail-toggle .arrow { transition: transform 0.2s; font-size: 0.7rem; }
    .detail-toggle.open .arrow { transform: rotate(90deg); }

    .detail-content {
      display: none;
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: #0d1117;
      border-radius: 6px;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      color: #c9d1d9;
      max-height: 400px;
      overflow-y: auto;
    }

    .detail-toggle.open + .detail-content { display: block; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #484f58;
    }

    .connection-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    .connection-dot.connected { background: #3fb950; }
    .connection-dot.disconnected { background: #f85149; }

    .status-bar {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Content Pipeline</h1>
    <p class="subtitle">Submit a topic. Three AI agents collaborate: Researcher, Writer, Editor.</p>

    <div class="status-bar">
      <span class="connection-dot disconnected" id="connDot"></span>
      <span id="connText">Connecting...</span>
    </div>

    <div class="input-row">
      <input type="text" id="topicInput" placeholder="Enter a topic..." />
      <button id="submitBtn" disabled>Submit</button>
    </div>

    <div class="progress-tracker" id="progressTracker">
      <div class="progress-topic" id="progressTopic"></div>
      <div class="stages">
        <div class="stage" id="stage-researching"><span class="dot"></span> Research</div>
        <div class="stage-connector" id="conn-1"></div>
        <div class="stage" id="stage-writing"><span class="dot"></span> Write</div>
        <div class="stage-connector" id="conn-2"></div>
        <div class="stage" id="stage-editing"><span class="dot"></span> Edit</div>
        <div class="stage-connector" id="conn-3"></div>
        <div class="stage" id="stage-done"><span class="dot"></span> Done</div>
      </div>
    </div>

    <h2 class="section-title">Jobs</h2>
    <div class="jobs-list" id="jobsList">
      <div class="empty-state">No jobs yet. Submit a topic to get started.</div>
    </div>
  </div>

  <script>
    const topicInput = document.getElementById('topicInput');
    const submitBtn = document.getElementById('submitBtn');
    const progressTracker = document.getElementById('progressTracker');
    const progressTopic = document.getElementById('progressTopic');
    const jobsList = document.getElementById('jobsList');
    const connDot = document.getElementById('connDot');
    const connText = document.getElementById('connText');

    const stages = ['researching', 'writing', 'editing', 'done'];
    const jobs = new Map();
    let ws;
    let running = false;

    function connect() {
      ws = new WebSocket('ws://localhost:3001');

      ws.onopen = () => {
        connDot.className = 'connection-dot connected';
        connText.textContent = 'Connected';
        submitBtn.disabled = false;
        ws.send(JSON.stringify({ type: 'list' }));
      };

      ws.onclose = () => {
        connDot.className = 'connection-dot disconnected';
        connText.textContent = 'Disconnected — reconnecting...';
        submitBtn.disabled = true;
        setTimeout(connect, 2000);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'progress') {
          const job = msg.job;
          jobs.set(job.id, job);
          updateProgress(job);
          renderJobs();

          if (job.status === 'done') {
            running = false;
            submitBtn.disabled = false;
            topicInput.disabled = false;
          }
        }

        if (msg.type === 'list') {
          for (const j of msg.jobs) jobs.set(j.id, j);
          renderJobs();
        }

        if (msg.type === 'job') {
          jobs.set(msg.job.id, msg.job);
          renderJobs();
        }
      };
    }

    function submit() {
      const topic = topicInput.value.trim();
      if (!topic || running) return;

      running = true;
      submitBtn.disabled = true;
      topicInput.disabled = true;

      progressTracker.classList.add('active');
      progressTopic.textContent = topic;
      resetProgress();

      ws.send(JSON.stringify({ type: 'submit', topic }));
      topicInput.value = '';
    }

    submitBtn.addEventListener('click', submit);
    topicInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

    function resetProgress() {
      stages.forEach((s) => {
        document.getElementById('stage-' + s).className = 'stage';
      });
      for (let i = 1; i <= 3; i++) {
        document.getElementById('conn-' + i).className = 'stage-connector';
      }
    }

    function updateProgress(job) {
      resetProgress();
      const idx = stages.indexOf(job.status);

      for (let i = 0; i < stages.length; i++) {
        const el = document.getElementById('stage-' + stages[i]);
        if (i < idx) el.className = 'stage done';
        else if (i === idx) el.className = job.status === 'done' ? 'stage done' : 'stage active';
      }

      for (let i = 1; i <= 3; i++) {
        if (i <= idx) document.getElementById('conn-' + i).className = 'stage-connector done';
      }
    }

    function renderJobs() {
      const sorted = Array.from(jobs.values()).sort((a, b) => b.startedAt - a.startedAt);

      if (sorted.length === 0) {
        jobsList.innerHTML = '<div class="empty-state">No jobs yet. Submit a topic to get started.</div>';
        return;
      }

      jobsList.innerHTML = sorted.map((job) => `
        <div class="job-card" data-id="${job.id}" onclick="toggleJob(this)">
          <div class="job-header">
            <span class="job-topic">${esc(job.topic)}</span>
            <span class="job-status ${job.status}">${job.status}</span>
          </div>
          <div class="job-details">
            ${section('Research Notes', job.research)}
            ${section('Draft Article', job.draft)}
            ${section('Final Article', job.final)}
          </div>
        </div>
      `).join('');
    }

    function section(title, content) {
      if (!content) return '';
      return `
        <div class="detail-section">
          <div class="detail-toggle" onclick="event.stopPropagation(); this.classList.toggle('open')">
            <span class="arrow">&#9654;</span> ${title}
          </div>
          <div class="detail-content">${esc(content)}</div>
        </div>
      `;
    }

    function toggleJob(el) {
      const id = el.dataset.id;
      const job = jobs.get(id);

      // Fetch full details if we don't have content yet
      if (job && !job.research && job.status !== 'researching') {
        ws.send(JSON.stringify({ type: 'get', id }));
      }

      el.classList.toggle('expanded');
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    connect();
  </script>
</body>
</html>
