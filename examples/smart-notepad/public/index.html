<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Notepad</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; color: #fff; }
    h1 .accent { color: #6c8aff; }

    .status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .status.connected { background: #4caf50; }

    .add-area { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }

    .add-area textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }
    .add-area textarea:focus { outline: none; border-color: #6c8aff; }

    .btn {
      background: #6c8aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1.25rem;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      height: 40px;
    }
    .btn:hover { background: #5a7ae6; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .search-bar { margin-bottom: 1.25rem; }
    .search-bar input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
    }
    .search-bar input:focus { outline: none; border-color: #6c8aff; }

    .notes { list-style: none; }

    .note {
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }
    .note:hover { border-color: #444; }

    .note-text { font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.5rem; }
    .note-summary { font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; font-style: italic; }
    .note-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
    .tag { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; font-weight: 500; }
    .note-meta { font-size: 0.7rem; color: #555; }

    .empty { text-align: center; color: #555; padding: 3rem 0; font-size: 0.9rem; }

    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: #e0e0e0;
      animation: slideIn 0.2s ease-out, fadeOut 0.3s ease-in 3.7s forwards;
      max-width: 320px;
    }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const TAG_COLORS = [
      '#6c8aff', '#ff6c8a', '#8aff6c', '#ff8a6c', '#8a6cff',
      '#6cffda', '#ffd76c', '#ff6cd7', '#6cfff0', '#d76cff',
    ];

    function tagColor(tag) {
      let hash = 0;
      for (let i = 0; i < tag.length; i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
      return TAG_COLORS[Math.abs(hash) % TAG_COLORS.length];
    }

    function useWebSocket(url) {
      const [connected, setConnected] = useState(false);
      const wsRef = useRef(null);
      const handlersRef = useRef(new Map());

      const send = useCallback((data) => {
        if (wsRef.current?.readyState === WebSocket.OPEN) {
          wsRef.current.send(JSON.stringify(data));
        }
      }, []);

      const on = useCallback((type, handler) => {
        handlersRef.current.set(type, handler);
      }, []);

      useEffect(() => {
        function connect() {
          const ws = new WebSocket(url);
          wsRef.current = ws;

          ws.onopen = () => {
            setConnected(true);
            handlersRef.current.get('open')?.();
          };

          ws.onclose = () => {
            setConnected(false);
            setTimeout(connect, 2000);
          };

          ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            handlersRef.current.get(msg.type)?.(msg);
          };
        }

        connect();
        return () => wsRef.current?.close();
      }, [url]);

      return { connected, send, on };
    }

    function Toast({ message, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 4000);
        return () => clearTimeout(t);
      }, [onDone]);

      return <div className="toast">{message}</div>;
    }

    function NoteCard({ note }) {
      const c = tagColor;
      return (
        <li className="note">
          <div className="note-text">{note.text}</div>
          {note.summary && <div className="note-summary">{note.summary}</div>}
          {note.tags?.length > 0 && (
            <div className="note-tags">
              {note.tags.map((t) => (
                <span key={t} className="tag" style={{ background: c(t) + '22', color: c(t) }}>{t}</span>
              ))}
            </div>
          )}
          <div className="note-meta">{new Date(note.createdAt).toLocaleString()}</div>
        </li>
      );
    }

    function App() {
      const [notes, setNotes] = useState([]);
      const [toasts, setToasts] = useState([]);
      const [input, setInput] = useState('');
      const [search, setSearch] = useState('');
      const searchTimer = useRef(null);

      const { connected, send, on } = useWebSocket('ws://localhost:3001');

      const addToast = useCallback((message) => {
        const id = Date.now() + Math.random();
        setToasts((prev) => [...prev, { id, message }]);
      }, []);

      useEffect(() => {
        on('open', () => send({ type: 'list' }));
        on('list', (msg) => setNotes(msg.notes));
        on('search', (msg) => setNotes(msg.notes));
        on('added', (msg) => setNotes((prev) => [msg.note, ...prev]));
        on('note:changed', (msg) => {
          if (msg.action === 'updated' && msg.note) {
            setNotes((prev) => prev.map((n) => n.id === msg.id ? msg.note : n));
          } else if (msg.action === 'deleted') {
            setNotes((prev) => prev.filter((n) => n.id !== msg.id));
          }
        });
        on('notification', (msg) => addToast(msg.message));
      }, [on, send, addToast]);

      const handleAdd = () => {
        const text = input.trim();
        if (!text) return;
        send({ type: 'add', text });
        setInput('');
      };

      const handleSearch = (q) => {
        setSearch(q);
        clearTimeout(searchTimer.current);
        searchTimer.current = setTimeout(() => {
          if (q.trim()) {
            send({ type: 'search', query: q.trim() });
          } else {
            send({ type: 'list' });
          }
        }, 300);
      };

      return (
        <>
          <div className="container">
            <h1>
              <span className="accent">Smart</span> Notepad{' '}
              <span className={`status ${connected ? 'connected' : ''}`} />
            </h1>

            <div className="add-area">
              <textarea
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAdd(); } }}
                placeholder="Write a note..."
                rows={2}
              />
              <button className="btn" onClick={handleAdd} disabled={!connected}>Add</button>
            </div>

            <div className="search-bar">
              <input
                type="text"
                value={search}
                onChange={(e) => handleSearch(e.target.value)}
                placeholder="Search notes..."
              />
            </div>

            <ul className="notes">
              {notes.length === 0
                ? <li className="empty">No notes yet. Write something above.</li>
                : notes.map((n) => <NoteCard key={n.id} note={n} />)
              }
            </ul>
          </div>

          <div className="toast-container">
            {toasts.map((t) => (
              <Toast
                key={t.id}
                message={t.message}
                onDone={() => setToasts((prev) => prev.filter((x) => x.id !== t.id))}
              />
            ))}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
